kafka:
  default:
    bootstrap_servers: "kafka-test:9092"

steps:
  - set:
      user_id: "{{ uuid() }}"
      order_id: "{{ uuid() }}"
      order_date: "{{ now() }}"
  - set:
      run_id: "{{ user_id }}-{{ order_id }}"
  - send:
      topic: "test-topic"
      body: "message1-text.json"
      key: xxxxx
      headers:
        header1: value1
        header2: value2
  - sleep:
      message: "Waiting {{ order_id }} 500ms"
      duration: 500ms
  - send:
      topic: "test-topic"
      body: "message2-built-in.json"
  - send:
      topic: "test-topic"
      key: "{{ user_id }}"
      headers:
        x-user: "{{ user_id }}"
      body: "message3-helpers.json"
  - send:
      topic: "test-topic"
      key: "{{ user_id }}"
      headers:
        x-user: "{{ user_id }}"
      body: "message4-random.json"
