name: Submit Order AAA

kafka:
  default:
    bootstrap_servers: "kafka-test:9092"

defaults:
    headers:
      content-type: application/json

steps:
  - set:
      user_id: "{{ uuid() }}"
      order_id: "{{ uuid() }}"
      order_date: "{{ now() }}"
  - send:
      topic: "test-topic"
      body: "message1-text.json"
      key: xxxxx
      headers:
        header1: value1
        header2: value2
  - sleep:
      message: "Waiting {{ order_id }} 500ms"
      duration: 500ms
  - send:
      topic: "test-topic"
      body: "message2-built-in.json"
  - send:
      topic: "test-topic"
      key: "{{ user_id }}"
      headers:
        x-user: "{{ user_id }}"
        content-type: application/xml
      body: "message3-helpers.json"
  - pause:
      message: "Waiting for messages to be processed {{ order_id }}"
      timeout: 5s
  - send:
      topic: "test-topic"
      key: "{{ user_id }}"
      headers:
        x-user: "{{ user_id }}"
      body: "message4-random.json"
  - pause:
      message: "Waiting for messages to be processed {{ order_id }}"
  - send:
      topic: "test-topic"
      key: "{{ user_id }}"
      headers:
        x-user: "{{ user_id }}"
      body: "message5-meta.json"
